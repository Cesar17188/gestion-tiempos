<div class="min-h-screen bg-fondo flex flex-col justify-center py-12 px-4 sm:px-6 lg:px-8 transition-colors duration-300">
  <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
    <div class="mx-auto h-16 w-16 bg-titulos rounded-full flex items-center justify-center shadow-lg transition-transform hover:scale-105 duration-300">
      <svg class="w-8 h-8 text-fondo" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
      </svg>
    </div>
    <h2 class="mt-6 text-center text-3xl font-extrabold text-titulos">
      Acceso al Sistema
    </h2>
    <p class="mt-2 text-center text-sm text-secundario">
      Control de Tiempos y Operaciones
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md w-full">
    <div class="bg-contraste-1 py-8 px-6 shadow-xl rounded-2xl sm:px-10 border border-contraste-3">

      <form class="space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

        <div>
          <label for="email" class="block text-sm font-medium text-normal mb-1">
            Correo Electrónico
          </label>
          <div class="relative">
            <input id="email" type="email" formControlName="email"
              class="appearance-none block w-full px-4 py-3 bg-fondo border border-contraste-3 rounded-xl shadow-sm text-normal placeholder-contraste-4 focus:outline-none focus:ring-2 focus:ring-titulos focus:border-titulos sm:text-sm transition-all duration-200"
              [ngClass]="{'border-red-400 focus:ring-red-500 focus:border-red-500': loginForm.get('email')?.invalid && loginForm.get('email')?.touched}"
              placeholder="admin@sucursal.com">
          </div>
          @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
            <p class="mt-2 text-sm text-red-500 font-medium">Ingresa un correo electrónico válido.</p>
          }
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-normal mb-1">
            Contraseña
          </label>
          <div class="relative">
            <input id="password" type="password" formControlName="password"
              class="appearance-none block w-full px-4 py-3 bg-fondo border border-contraste-3 rounded-xl shadow-sm text-normal placeholder-contraste-4 focus:outline-none focus:ring-2 focus:ring-titulos focus:border-titulos sm:text-sm transition-all duration-200"
              [ngClass]="{'border-red-400 focus:ring-red-500 focus:border-red-500': loginForm.get('password')?.invalid && loginForm.get('password')?.touched}"
              placeholder="••••••••">
          </div>
        </div>

        @if (errorMessage) {
          <div class="rounded-xl bg-red-50 p-4 border border-red-200 shadow-sm animate-pulse">
            <div class="flex">
              <div class="ml-3">
                <h3 class="text-sm font-medium text-red-800">{{ errorMessage }}</h3>
              </div>
            </div>
          </div>
        }

        <div class="pt-2">
          <button type="submit" [disabled]="loginForm.invalid || isLoading"
            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-md text-base font-semibold text-boton-texto bg-boton hover:bg-secundario focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-boton disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-300">

            @if (isLoading) {
              <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-boton-texto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Verificando acceso...
            } @else {
              Ingresar al Dashboard
            }
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
