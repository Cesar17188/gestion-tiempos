<div class="min-h-screen bg-slate-50 py-10 px-4 sm:px-6 lg:px-8">
  <div class="max-w-xl mx-auto">

    <div class="mb-6 flex items-center justify-between">
      <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Mi Perfil</h1>
      <button (click)="volver()" class="flex items-center text-sm font-semibold text-gray-600 hover:text-indigo-600 bg-white px-4 py-2 rounded-xl shadow-sm border border-gray-200 transition-colors">
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Volver al Dashboard
      </button>
    </div>

    @if (isLoading) {
      <div class="flex justify-center items-center py-20">
        <svg class="animate-spin h-8 w-8 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
      </div>
    } @else {
      <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">

        <div class="h-32 bg-indigo-600 w-full relative">
          <div class="absolute -bottom-12 left-8">
            <!-- Contenedor del Avatar clickeable -->
            <label for="avatar-upload" class="cursor-pointer block relative group h-24 w-24 bg-white rounded-full p-1.5 shadow-lg">
              <div class="h-full w-full bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 overflow-hidden relative">
                @if (fotoPreview || datosPerfil?.avatar_url) {
                  <img [src]="fotoPreview || datosPerfil?.avatar_url" class="w-full h-full object-cover" alt="Avatar del usuario">
                } @else {
                  <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                }
                <!-- Overlay Hover -->
                <div class="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                  <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </div>
              </div>
              <input type="file" id="avatar-upload" class="hidden" accept="image/*" (change)="onFileSelected($event)">
            </label>
          </div>
        </div>

        <div class="pt-16 px-8 pb-8">
          <div class="flex justify-between items-start mb-6">
            <div class="w-full pr-4">
              <!-- Campo Nombre Editable -->
              <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
              <input type="text" [(ngModel)]="nombreEdit" class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 mb-2">
              <p class="text-gray-500 font-medium text-sm">{{ authUsuario?.email }}</p>
            </div>

            <span class="px-3 py-1 text-xs font-bold rounded-full uppercase tracking-widest shrink-0"
                  [ngClass]="{
                    'bg-purple-100 text-purple-700': datosPerfil?.rol === 'ADMINISTRADOR',
                    'bg-blue-100 text-blue-700': datosPerfil?.rol === 'ENCARGADO' || !datosPerfil?.rol
                  }">
              {{ datosPerfil?.rol || 'ENCARGADO' }}
            </span>
          </div>

          <!-- Botón Guardar Cambios -->
          <button (click)="guardarCambios()" [disabled]="isSaving" class="w-full mb-6 flex justify-center items-center py-3.5 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
            @if (isSaving) {
              <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
              Guardando...
            } @else {
              <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
              Guardar Cambios
            }
          </button>

          <div class="border-t border-gray-100 pt-6 flex flex-col space-y-4">
            <button (click)="cerrarSesion()" class="w-full flex justify-center items-center py-3.5 px-4 border border-red-200 rounded-xl shadow-sm text-sm font-bold text-red-600 bg-red-50 hover:bg-red-100 transition-colors">
              <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
              Cerrar Sesión
            </button>
          </div>
        </div>

      </div>
    }
  </div>

  <!-- Toast Notification -->
  @if (showToast) {
    <div class="fixed bottom-4 right-4 z-50 flex items-center p-4 mb-4 text-gray-500 bg-white rounded-lg shadow-lg border-l-4" [ngClass]="{'border-green-500': toastType === 'success', 'border-red-500': toastType === 'error'}">
      <div class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-lg" [ngClass]="{'bg-green-100 text-green-500': toastType === 'success', 'bg-red-100 text-red-500': toastType === 'error'}">
        @if (toastType === 'success') {
          <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
              <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.707 8.207-4 4a1 1 0 0 1-1.414 0l-2-2a1 1 0 0 1 1.414-1.414L9 10.586l3.293-3.293a1 1 0 0 1 1.414 1.414Z"/>
          </svg>
        } @else {
          <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
              <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.707 11.793a1 1 0 1 1-1.414 1.414L10 11.414l-2.293 2.293a1 1 0 0 1-1.414-1.414L8.586 10 6.293 7.707a1 1 0 0 1 1.414-1.414L10 8.586l2.293-2.293a1 1 0 0 1 1.414 1.414L11.414 10l2.293 2.293Z"/>
          </svg>
        }
      </div>
      <div class="ms-3 text-sm font-normal mr-2">{{ toastMessage }}</div>
      <button type="button" (click)="showToast = false" class="ms-auto -mx-1.5 -my-1.5 bg-white text-gray-400 hover:text-gray-900 rounded-lg focus:ring-2 focus:ring-gray-300 p-1.5 hover:bg-gray-100 inline-flex items-center justify-center h-8 w-8">
          <span class="sr-only">Cerrar</span>
          <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
              <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
          </svg>
      </button>
    </div>
  }
</div>
