<div class="metricas-grid">
  <div class="card metrica-card">
    <div class="metrica-icon icon-recaudacion">
      <svg class="icon-medium" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
    </div>
    <div class="metrica-info">
      <p>Recaudación</p>
      <h3>${{ totalRecaudado | number:'1.2-2' }}</h3>
    </div>
  </div>

  <div class="card metrica-card">
    <div class="metrica-icon icon-ninos">
      <svg class="icon-medium" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10h4.764a2 2 0 011.789 2.894l-3.5 7A2 2 0 0115.263 21h-4.017c-.163 0-.326-.02-.485-.06L7 20m7-10V5a2 2 0 00-2-2h-.095c-.5 0-.905.405-.905.905 0 .714-.211 1.412-.608 2.006L7 11v9m7-10h-2M7 20H5a2 2 0 01-2-2v-6a2 2 0 012-2h2.5"></path>
      </svg>
    </div>
    <div class="metrica-info">
      <p>Total Niños</p>
      <h3>{{ totalNinos }}</h3>
    </div>
  </div>

  <div class="card metrica-card">
    <div class="metrica-icon icon-minutos">
      <svg class="icon-medium" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
    </div>
    <div class="metrica-info">
      <p>Minutos Jugados</p>
      <h3>{{ totalMinutosJugados }} <span>min</span></h3>
    </div>
  </div>

  <div class="card metrica-card">
    <div class="metrica-icon icon-pico">
      <svg class="icon-medium" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
      </svg>
    </div>
    <div class="metrica-info">
      <p>Día Pico</p>
      <h3 class="pico-fecha">{{ diaPico.fecha }}</h3>
      <span class="pico-cantidad">{{ diaPico.cantidad }} ingresos</span>
    </div>
  </div>
</div>
